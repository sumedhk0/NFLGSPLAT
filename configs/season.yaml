# Season batch config: SLURM knobs for PACE. Plays are discovered by walking
# the per-play tree (data/{season}/week_NN/{matchup}/play_NNN); see
# scripts/run_season.py. No games list — the filesystem is the source of truth.

season: 2024

paths:
  data_root: data        # season tree root: data/{season}/week_NN/{matchup}/play_NNN

slurm:
  account: gatech
  partition: gpu-h100
  gpu: "h100:1"
  qos: embers
  requeue: true
  cpus_per_task: 8
  mem: "64G"
  time_perception: "01:00:00"
  time_avatar: "04:00:00"
  time_render: "01:00:00"
