# Master pipeline configuration. Loaded via OmegaConf.
# Stage configs (field_recon.yaml, smplx_fit.yaml, avatar.yaml) override slices.
# CLI overrides: `... game_id=game_042 avatars.heroes=[12,81]`

game_id: game_001
play_id: play_001

paths:
  raw_video: data/raw
  annotations: data/annotations
  outputs: outputs
  body_models: data/body_models
  weights: weights

cameras:
  - sideline
  - endzone

# Field / world frame — frozen. Origin at center, +X home endzone, +Z up.
# Values derived from the NFL rulebook:
#   length 120 yd = 109.728 m   (playing field 100 yd + 2 x 10 yd endzones)
#   width  53⅓ yd = 48.768 m
#   hash marks 70'9" from each sideline → offset from centerline
#     = 80 ft (half-width) − 70.75 ft = 9.25 ft = 2.8194 m
#   yard-line spacing 5 yd = 4.572 m
world:
  field_length_m: 109.728
  field_width_m: 48.768
  hash_offset_m: 2.8194
  yard_line_spacing_m: 4.572

field:
  pre_snap_frames_per_cam: 60
  fps_sample: 2.0
  splatfacto_iters: 30000
  cull_alpha_thresh: 0.1
  sh_degree: 3
  background_color: [0.0, 0.0, 0.0]

tracking:
  yolo_weights: yolov8x.pt
  tracker: botsort
  jersey_ocr_enabled: true
  field_buffer_m: 1.0
  min_detection_conf: 0.35

pose:
  body_joints: 22
  smplx_gender: neutral
  reproj_reject_px: 20.0
  smplestx_conf_reject: 0.3
  min_valid_joints_per_frame: 10
  max_missing_frame_fraction: 0.30
  gap_interpolation_frames: 5
  smoother:
    min_cutoff: 1.0
    beta: 0.007
    d_cutoff: 1.0

avatars:
  default_method: lhm
  heroes: []
  lhm:
    model: auto          # auto | lhm_1b | lhm_mini
    vram_floor_gb: 8.0
    vram_1b_gb: 16.0
  gdgs_avatar:
    iters: 20000
    batch_size: 4
  # Per-player avatar + shape library (cache tier above the per-play manifest).
  # Built once per player, reused across every play/game of the season.
  library:
    enabled: true
    path: library
    rebuild: false       # true forces regeneration even on a cache hit

# Season-scoped player identity. The roster prior turns recognition into
# constrained classification; OcrOnlySource is the fallback when no roster
# data is present. See nfl_gsplat.identity.
identity:
  enabled: true
  source: roster         # roster | ocr_only
  season: 0              # set per run, e.g. 2024
  roster_path: data/rosters/${identity.season}
  match:
    jersey_weight: 1.0
    team_mismatch_cost: 1000.0
    unknown_jersey_cost: 5.0
    max_match_cost: 8.0
  referee:
    enabled: true
    min_stripe_transitions: 4
    max_mean_saturation: 60.0

ball:
  yolo_weights: ball_yolov8.pt
  min_detection_conf: 0.25
  kalman:
    gravity_mps2: 9.81
    process_noise: 0.5
    measurement_noise_px: 3.0
  # Render the ball as the canonical football asset (library uid __football__)
  # oriented along the Kalman velocity, rather than a placeholder blob.
  asset:
    use_canonical_asset: true
    spin_rate: 6.0       # rad per (m/s · s) about the long axis

calibration:
  max_reproj_px: 5.0
  bundle_adjustment: true
  min_landmarks: 6

compositing:
  virtual_camera:
    trajectory: configs/trajectories/fly_through.yaml
    fps: 30
  encode:
    codec: libx264
    crf: 18

slurm:
  account: gatech
  partition: gpu-h100
  gpu: h100:1
  cpus_per_task: 8
  mem: "64G"
  time_field: "02:00:00"
  time_play: "01:00:00"
  time_avatar_hero: "04:00:00"

logging:
  level: INFO
  json_file: logs/pipeline.jsonl
  rich_console: true

cache:
  force: false
  manifest_hash_algo: sha256
