name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpu-tests:
    name: CPU tests (smoke + unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system libs for opencv-python
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Show env
        run: |
          python -c "import numpy, scipy, cv2, omegaconf; \
            print('numpy', numpy.__version__); \
            print('scipy', scipy.__version__); \
            print('opencv', cv2.__version__); \
            print('omegaconf', omegaconf.__version__)"

      - name: Run CPU test suite
        run: |
          pytest -m "not gpu and not slow and not real_video" \
            --junitxml=pytest.xml -ra -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest.xml

  lint:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check nfl_gsplat tests scripts
