name: nfl_smplx
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pytorch=2.1.2
  - torchvision=0.16.2
  - pytorch-cuda=12.1
  - numpy=1.26.4
  - scipy=1.11.4
  - pyyaml
  - pip
  - pip:
    # mmcv ships compiled CUDA ops; pulling it from PyPI tries to BUILD from
    # source (needs nvcc, absent on login nodes). Point pip at OpenMMLab's
    # prebuilt wheel index for torch 2.1 / cu121 so it installs a binary wheel.
    # (If this index ever 404s for your exact torch, `mim install mmcv==2.1.0`
    # inside the env auto-detects the right wheel — see SETUP.md §1.)
    - --find-links https://download.openmmlab.com/mmcv/dist/cu121/torch2.1/index.html
    - omegaconf==2.3.0
    - typer==0.12.3
    # typer 0.12.3 emits secondary flags that click>=8.2 rejects ("Secondary
    # flag is not valid for non-boolean flag"), breaking every typer CLI. Pin <8.2.
    - click==8.1.7
    - rich==13.7.1
    - opencv-python==4.10.0.84
    - smplx==0.1.28
    - mmcv==2.1.0
    - mmpose==1.3.1
    - mmdet==3.3.0
    # chumpy is installed in a post-build step by 00_setup_environments.sh:
    # chumpy 0.70's setup.py does `import pip`, which fails inside pip's isolated
    # build env, so it needs --no-build-isolation. (VPoser / human-body-prior is
    # not installed: the pose fit uses an L2 prior surrogate — see fuse_smplx.)
    - trimesh==4.3.2
    - ultralytics==8.2.50
    - paddleocr==2.7.3
    - paddlepaddle-gpu==2.6.1
    - pandas==2.2.2
    - pyarrow==16.1.0
